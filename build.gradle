plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    // Geckolib (animated block models for the Part Press). Geckolib's Cloudsmith maven.
    // Geckolib 4.x (the 1.20.1 line) uses the software.bernie.geckolib group.
    maven {
        url = "https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/"
        content {
            includeGroup "software.bernie.geckolib"
        }
    }
    // JEI (Just Enough Items) and Patchouli. Hosted on BlameJared's maven.
    maven {
        url = "https://maven.blamejared.com/"
        content {
            includeGroup "mezz.jei"
            includeGroup "vazkii.patchouli"
        }
    }
}

base {
    archivesName = "${mod_id}-forge-${minecraft_version}"
}

// Minecraft 1.20.1 ships Java 17 to end users, so mods must target Java 17.
java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    // The mappings can be changed at any time and must be in the following format.
    // Channel:   Version:
    // official   MCVersion        Official field/method names from Mojang mapping files
    // parchment  YYYY.MM.DD-MCVersion   Open community-sourced parameter names and javadocs layered on top of official
    mappings channel: mapping_channel, version: mapping_version

    // When true, this property will have all Eclipse/IntelliJ IDEA run configurations run the "prepareX" task for the given run configuration before launching the game.
    copyIdeResources = true

    // This property allows configuring Gradle's ProcessResources task(s) to run on IDE output locations before launching the game.
    // accessTransformer = file('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        // applies to all the run configs below
        configureEach {
            workingDirectory project.file('run')

            // Dev-only: remap mixin refmaps of deobfuscated dependency mods (Patchouli) from
            // SRG to the official names this environment runs with. No effect on the built jar.
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"

            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            property 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            property 'forge.logging.console.level', 'debug'

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        client {
            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        data {
            workingDirectory project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // Specify the version of Minecraft to use.
    // Any artifact can be supplied so long as it has a "userdev" classifier artifact and is a compatible patcher artifact.
    // The "userdev" classifier will be requested and setup by ForgeGradle.
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    // Patchouli — in-game documentation. The Smithery book is pure JSON under
    // assets/smithery/patchouli_books/, so we only need the API at compile time
    // (book item lookups) and the mod present at runtime for dev testing.
    compileOnly fg.deobf("vazkii.patchouli:Patchouli:${minecraft_version}-${patchouli_version}-FORGE:api")
    localRuntime fg.deobf("vazkii.patchouli:Patchouli:${minecraft_version}-${patchouli_version}-FORGE")

    // Geckolib — animated block models. Powers the Part Press.
    implementation fg.deobf("software.bernie.geckolib:geckolib-forge-${minecraft_version}:${geckolib_version}")

    // JEI — recipe viewer integration. Compile against the API split (common + forge);
    // pull the full runtime jar only into localRuntime so downstream consumers don't inherit
    // a hard JEI dependency.
    compileOnly fg.deobf("mezz.jei:jei-${minecraft_version}-common-api:${jei_version}")
    compileOnly fg.deobf("mezz.jei:jei-${minecraft_version}-forge-api:${jei_version}")
    localRuntime fg.deobf("mezz.jei:jei-${minecraft_version}-forge:${jei_version}")
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            forge_version          : forge_version,
            forge_version_range    : forge_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata

// Forge 1.20.1 mods are distributed in SRG names, so the built jar must be reobfuscated.
tasks.named('jar', Jar).configure {
    finalizedBy 'reobfJar'
}

// Publish the finished (reobfuscated) jar into dist/, which holds exactly one latest
// build per loader; stale forge jars are removed before the copy.
def distDir = layout.projectDirectory.dir('dist')
def distJarPrefix = "${mod_id}-forge-"
tasks.register('collectDist', Copy) {
    dependsOn 'reobfJar'
    from tasks.named('jar')
    into distDir
    doFirst {
        distDir.asFile.mkdirs()
        distDir.asFile.listFiles()
            .findAll { it.name.startsWith(distJarPrefix) && it.name.endsWith('.jar') }
            .each { it.delete() }
    }
}
tasks.named('build').configure { finalizedBy 'collectDist' }

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
    // Report every diagnostic instead of javac's 100-error default; with generated
    // registration code a single root cause can fan out past the cap and hide itself.
    options.compilerArgs.addAll(['-Xmaxerrs', '10000'])
}

/**
 * Generates HTML API documentation for Smithery into {@code build/docs/javadoc}.
 *
 * Coverage matches the source pass: public and protected members only — private and
 * package-private declarations are intentionally skipped. Run with {@code ./gradlew javadoc}.
 *
 * {@code failOnError = false} keeps the build alive when the doclet trips on Minecraft /
 * Forge / JEI / Modonomicon / Geckolib classes it cannot resolve (those libraries are
 * not on the javadoc classpath in offline runs). Doclint is disabled for the same reason
 * — we explicitly skip private docs by design, which would otherwise emit MISSING tag noise.
 */
javadoc {
    options.encoding = 'UTF-8'
    options.charSet = 'UTF-8'
    options.memberLevel = JavadocMemberLevel.PROTECTED
    options.author = false
    options.version = false
    options.windowTitle = "${mod_name} ${mod_version} API"
    options.docTitle = "${mod_name} ${mod_version} API"
    options.bottom = "<i>Smithery — modular Tinkers-style tool crafting for Forge.</i>"
    options.addStringOption('Xdoclint:none', '-quiet')
    failOnError = false
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
